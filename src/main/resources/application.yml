server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: white-tea-platform
  # 新增：启用ANSI彩色输出（关键配置1）
  output:
    ansi:
      enabled: DETECT # 可选值：ALWAYS(强制启用)、DETECT(自动检测)、NEVER(禁用)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/white_tea_db?useSSL=true&requireSSL=true
    username: root
    password: 123456

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

# JWT配置
jwt:
  secret: fudingWhiteTeaPlatformSecretKey2023
  expiration: 86400000  # 24小时

# 文件上传配置
file:
  upload:
    path: D:/uploads/white-tea/
    max-size: 10485760  # 10MB

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 修改：注释/删除原有的标准输出日志实现，改用Spring Boot日志框架（关键配置2）
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.fuding.entity

# AI API配置
ai:
  api:
    # 千帆（Qianfan）V2 Chat Completions（OpenAI风格）
    # 文档：https://cloud.baidu.com/doc/qianfan-api/s/ym9chdsy5
    url: https://qianfan.baidubce.com/v2/chat/completions
    # API Key请使用环境变量/密钥管理，不要明文写入仓库
    key: bce-v3/ALTAK-PZI1EXJ5JORWWM7Odnrf8/a7b00571b007d3af0ffc9de63b7e7eac485a6af0 # ${QIANFAN_API_KEY:}
    # qianfan返回为OpenAI风格choices结构，使用openai解析逻辑即可
    type: qianfan # qianfan(千帆V2), wenxin(旧文心), tongyi(通义千问), openai(OpenAI兼容)
    model: ernie-3.5-8k # 例如：ernie-3.5-8k

# 日志配置
logging:
  level:
    root: INFO
    com.fuding: DEBUG
    com.fuding.mapper: DEBUG
  pattern:
    # 修改：添加彩色占位符%clr()（关键配置3），实现不同日志级别不同颜色
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){blue} %clr([%thread]){green} %clr(%-5level){red} %clr(%logger{50}){yellow} - %clr(%msg%n){white}"