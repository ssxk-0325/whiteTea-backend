server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: white-tea-platform
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/white_tea_db?useSSL=true&requireSSL=true
    username: root
    password: 123456
  
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

# JWT配置
jwt:
  secret: fudingWhiteTeaPlatformSecretKey2023
  expiration: 86400000  # 24小时

# 文件上传配置
file:
  upload:
    path: D:/uploads/white-tea/
    max-size: 10485760  # 10MB

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.fuding.entity

# AI API配置
ai:
  api:
    url: # 大模型API地址，例如：https://aip.baidubce.com/rpc/2.0/ai_custom/v1/wenxinworkshop/chat/ernie-bot-turbo
    key: # API密钥
    type: wenxin # wenxin(文心一言), tongyi(通义千问), openai(ChatGPT)
    model: # 模型名称，例如：ernie-bot-turbo, gpt-3.5-turbo

# 日志配置
logging:
  level:
    root: INFO
    com.fuding: DEBUG
    com.fuding.mapper: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

