server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: white-tea-platform
  # 新增：启用ANSI彩色输出（关键配置1）
  output:
    ansi:
      enabled: DETECT # 可选值：ALWAYS(强制启用)、DETECT(自动检测)、NEVER(禁用)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/white_tea_db?useSSL=true&requireSSL=true
    username: root
    password: 123456

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

# JWT配置
jwt:
  secret: fudingWhiteTeaPlatformSecretKey2023
  expiration: 86400000  # 24小时

# 支付宝（沙箱：https://open.alipay.com/develop/sandbox/app）
# 未配置密钥时请将 enabled 设为 false；异步通知需公网可访问的 server-base-url（可用内网穿透）
alipay:
  enabled: true
  gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  app-id: "9021000162661561"
  app-private-key: ""
  alipay-public-key: ""
  server-base-url: http://t56f99da.natappfree.cc/api #http://localhost:8080/api
  frontend-redirect-url: http://localhost:3000/orders

# 文件上传配置
file:
  upload:
    path: D:/uploads/white-tea/
    max-size: 10485760  # 10MB

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 修改：注释/删除原有的标准输出日志实现，改用Spring Boot日志框架（关键配置2）
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.fuding.entity

# AI API配置（默认：智谱 AI BigModel，OpenAI 兼容 Chat Completions）
# Java 示例与端点说明：https://docs.bigmodel.cn/cn/guide/models/text/glm-4#java
ai:
  api:
    # 须为完整 chat/completions 地址（文档 cURL 示例）
    url: https://open.bigmodel.cn/api/paas/v4/chat/completions
    # 在环境变量或 IDE 运行配置中设置 ZHIPU_API_KEY，勿将密钥提交到仓库
    key: 309cb33e734a4881a119607a7a4d0d38.B9qCx6qVrM1rIt8B
    # zhipu / glm：智谱；qianfan：千帆；openai：任意 OpenAI 兼容网关
    type: zhipu
    # 例如：glm-4-plus、glm-4-flash、glm-4-air-250414（见智谱模型列表）
    model: glm-4-flash

# 日志配置
logging:
  level:
    root: INFO
    com.fuding: DEBUG
    com.fuding.mapper: DEBUG
  pattern:
    # 修改：添加彩色占位符%clr()（关键配置3），实现不同日志级别不同颜色
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){blue} %clr([%thread]){green} %clr(%-5level){red} %clr(%logger{50}){yellow} - %clr(%msg%n){white}"